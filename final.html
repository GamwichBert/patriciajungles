<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S U C E S S O !</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎆</text></svg>">
    <style>
        .fireworks-body {
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .success-text {
            font-family: 'Cinzel', serif;
            font-size: 5rem;
            color: #fff;
            text-shadow: 0 0 20px #ff0055, 0 0 40px #ff0055, 0 0 80px #ff0055;
            z-index: 100;
            animation: pulse 2s infinite;
        }

        .sub-text {
            font-family: 'Poppins', sans-serif;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: -10px;
            margin-bottom: 30px;
            z-index: 100;
            position: relative;
            letter-spacing: 1px;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                text-shadow: 0 0 20px #ff0055;
            }

            50% {
                transform: scale(1.1);
                text-shadow: 0 0 40px #ff0055, 0 0 60px #ff6699;
            }

            100% {
                transform: scale(1);
                text-shadow: 0 0 20px #ff0055;
            }
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .back-btn {
            position: absolute;
            bottom: 40px;
            font-family: 'Poppins', sans-serif;
            font-size: 1.2rem;
            color: #fff;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .no-return-msg {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translate(-50%, 20px);
            font-family: 'Poppins', sans-serif;
            font-size: 1.4rem;
            color: #ffd700;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 25px;
            border-radius: 12px;
            border: 2px solid #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 101;
            white-space: nowrap;
        }
    </style>
</head>

<body class="fireworks-body">

    <canvas id="fireworksCanvas"></canvas>

    <h1 class="success-text">Então vamos estragar ele! 😏</h1>
    <p class="sub-text">entao bora? vamo vamo vamo??????</p>

    <!-- Caixa da mensagem sem volta (escondida no começo) -->
    <div id="noReturnMsg" class="no-return-msg">Sem volta, agora vai ter q dar!</div>

    <button onclick="showNoReturnMessage()" class="back-btn">Voltar ao Condado</button>

    <script>
        // Sistema básico de fogos de artifício no Canvas
        const canvas = document.getElementById("fireworksCanvas");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 2 + 1;

                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;

                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;

                this.friction = 0.95;
                this.gravity = 0.1;
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.01;
            }

            update() {
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;

                this.x += this.vx;
                this.y += this.vy;

                this.alpha -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        const particles = [];
        const colors = ['#ff0055', '#ffcc00', '#00ffcc', '#0066ff', '#ff66ff', '#ffffff'];

        function explode(x, y) {
            const color = colors[Math.floor(Math.random() * colors.length)];
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; // Deixa um rastro suave
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();

                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        // Criar fogos automaticamente e aleatoriamente
        setInterval(() => {
            const x = Math.random() * canvas.width;
            const y = Math.random() * (canvas.height / 2); // Explode mais em cima
            explode(x, y);
        }, 800);

        // Explodir ao clicar também!
        canvas.addEventListener('click', (e) => {
            explode(e.clientX, e.clientY);
        });

        // Script do botão "Sem Volta"
        function showNoReturnMessage() {
            const msgBox = document.getElementById("noReturnMsg");
            const btn = document.querySelector(".back-btn");

            // Trocar o texto do botão (opcional) ou simplesmente desativá-lo
            btn.style.opacity = "0.7";
            btn.style.cursor = "not-allowed";

            // Mostrar a mensagem
            msgBox.style.opacity = "1";
            msgBox.style.transform = "translate(-50%, 0)";
        }

        animate();
    </script>
</body>

</html>
